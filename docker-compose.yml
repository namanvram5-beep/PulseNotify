
version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: pulsenotify_postgres

    restart: always

    environment:
      POSTGRES_DB: pulsenotify

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7-alpine

    container_name: pulsenotify_redis

    restart: always

    ports:
      - "6379:6379"

  web:

    build: .

    container_name: pulsenotify_web

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  celery:

    build: .

    container_name: pulsenotify_worker

    command: celery -A config worker -l info

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  celery-beat:

    build: .

    container_name: pulsenotify_beat

    command: celery -A config beat -l info

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

volumes:

  postgres_data:version: '3.9'
services:
  db:
    image: postgres:16
